<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script src="coi-serviceworker.js"></script>
    
    <title>AI 影像批次處理工具 (內部專用)</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/bundle.js"></script>

    <style>
        :root { --primary: #4A90E2; --success: #27AE60; --danger: #E74C3C; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #f8f9fa; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; color: #333; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        
        /* 上傳框 */
        #drop-zone { border: 3px dashed #dee2e6; border-radius: 10px; padding: 40px; text-align: center; cursor: pointer; transition: 0.3s; background: #fff; }
        #drop-zone:hover { border-color: var(--primary); background: #f0f7ff; }

        /* 說明區 */
        .info-panel { background: #fff9db; border-left: 5px solid #fcc419; padding: 15px; margin: 20px 0; font-size: 0.9rem; }
        .info-panel ul { margin: 5px 0 0 20px; padding: 0; }

        /* 進度條 */
        #process-area { display: none; margin-top: 25px; width: 100%; }
        .progress-bg { background: #e9ecef; height: 12px; border-radius: 6px; overflow: hidden; margin: 10px 0; }
        #progress-fill { background: var(--primary); width: 0%; height: 100%; transition: 0.3s; }
        
        /* 錯誤日誌 */
        #log-area { display: none; margin-top: 20px; background: #fff5f5; border: 1px solid #ffc9c9; padding: 15px; border-radius: 8px; text-align: left; max-height: 250px; overflow-y: auto; }
        .log-item { color: #d63031; font-size: 0.85rem; margin-bottom: 8px; border-bottom: 1px solid #ffe3e3; padding-bottom: 4px; }
        .log-reason { color: #636e72; margin-left: 18px; display: block; font-style: italic; }

        /* 下載按鈕 */
        #download-btn { display: none; width: 100%; background: var(--success); color: white; padding: 16px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 10px rgba(39,174,96,0.3); }
        #download-btn:hover { background: #219150; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top:0;">🖼️ 批次去背縮放工具</h2>
    
    <div id="drop-zone">拖曳多張圖片到這裡，或點擊上傳</div>
    <input type="file" id="file-input" multiple accept="image/*">

    <div class="info-panel">
        <strong>📌 自動作業規範：</strong>
        <ul>
            <li><b>檔名限制：</b> 僅允許數字 (0-9) 與底線 (_)</li>
            <li><b>固定尺寸：</b> 自動調整為 800x800 </li>
            <li><b>去背轉檔：</b> AI 自動去背並輸出 PNG 透明檔</li>
            <li><b>說明：</b> 不符規則或處理失敗之檔案將會顯示原因。</li>
        </ul>
    </div>

    <div id="process-area">
        <div id="status-text" style="font-weight:bold; color: var(--primary);">正在檢查檔案...</div>
        <div class="progress-bg"><div id="progress-fill"></div></div>
        <div id="counter-text" style="text-align:right; font-size: 0.8rem; color: #999;">0 / 0</div>
    </div>

    <div id="log-area">
        <strong style="color: #c0392b;">⚠️ 跳過處理清單：</strong>
        <div id="log-list" style="margin-top: 10px;"></div>
    </div>

    <button id="download-btn">🚀 下載處理完成圖 (ZIP)</button>
</div>

<script>
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const processArea = document.getElementById('process-area');
    const progressBar = document.getElementById('progress-fill');
    const statusText = document.getElementById('status-text');
    const counterText = document.getElementById('counter-text');
    const logArea = document.getElementById('log-area');
    const logList = document.getElementById('log-list');
    const downloadBtn = document.getElementById('download-btn');

    let zipBlob = null;

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFiles(e.target.files);
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = '#4A90E2'; };
    dropZone.ondragleave = () => { dropZone.style.borderColor = '#dee2e6'; };
    dropZone.ondrop = (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); };

    async function handleFiles(files) {
        if (files.length === 0) return;

        // 初始化
        const zip = new JSZip();
        zipBlob = null;
        logList.innerHTML = "";
        logArea.style.display = "none";
        downloadBtn.style.display = "none";
        processArea.style.display = "block";

        const total = files.length;
        const namePattern = /^[0-9_]+$/;

        for (let i = 0; i < total; i++) {
            const file = files[i];
            const fullName = file.name;
            const nameOnly = fullName.split('.').slice(0, -1).join('.').trim();

            // 更新 UI
            statusText.innerText = `正在處理: ${fullName}`;
            counterText.innerText = `${i + 1} / ${total}`;
            progressBar.style.width = `${((i + 1) / total) * 100}%`;

            // 1. 檔名檢查
            if (!namePattern.test(nameOnly)) {
                addLog(fullName, `檔名格式不符 (含有數字與底線以外的字元: "${nameOnly}")`);
                continue;
            }

            try {
                // 2. AI 去背 (包含環境偵測)
                let noBgBlob;
                try {
                    noBgBlob = await imglyRemoveBackground(file);
                } catch (e) {
                    if (window.crossOriginIsolated === false) {
                        throw new Error("安全環境未啟動 (請確認 coi-serviceworker.js 是否存在並按 Ctrl+F5)");
                    } else {
                        throw new Error("AI 引擎無法辨識此圖或圖檔毀損");
                    }
                }

                // 3. 縮放 800x800
                const finalBlob = await resizeTo800(noBgBlob);

                // 4. 打包
                zip.file(`${nameOnly}.png`, finalBlob);

            } catch (err) {
                addLog(fullName, err.message);
            }
        }

        statusText.innerText = "✅ 處理結束";
        if (Object.keys(zip.files).length > 0) {
            zipBlob = await zip.generateAsync({ type: "blob" });
            downloadBtn.style.display = "block";
        } else {
            statusText.innerText = "❌ 沒有任何檔案成功處理";
        }
    }

    function resizeTo800(blob) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 800;
                canvas.height = 800;
                const ctx = canvas.getContext('2d');
                
                // 等比例縮放並置中
                const ratio = Math.min(800 / img.width, 800 / img.height);
                const w = img.width * ratio;
                const h = img.height * ratio;
                const x = (800 - w) / 2;
                const y = (800 - h) / 2;

                ctx.clearRect(0, 0, 800, 800);
                ctx.drawImage(img, x, y, w, h);
                canvas.toBlob((b) => resolve(b), 'image/png');
            };
            img.src = URL.createObjectURL(blob);
        });
    }

    function addLog(filename, reason) {
        logArea.style.display = "block";
        const div = document.createElement('div');
        div.className = "log-item";
        div.innerHTML = `❌ <strong>跳過：</strong> ${filename} <span class="log-reason">原因：${reason}</span>`;
        logList.appendChild(div);
    }

    downloadBtn.onclick = () => {
        const link = document.createElement('a');
        link.href = URL.createObjectURL(zipBlob);
        link.download = `IMG_PROCESSED_${Date.now()}.zip`;
        link.click();
    };
</script>

</body>
</html>
