<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="coi-serviceworker.js"></script>
    <title>AI 批次影像處理器</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/bundle.js"></script>

    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; shadow: 0 4px 12px rgba(0,0,0,0.1); width: 100%; max-width: 600px; text-align: center; }
        #drop-zone { border: 3px dashed #ccc; padding: 40px; cursor: pointer; border-radius: 10px; margin-bottom: 20px; }
        #drop-zone:hover { border-color: #4A90E2; background: #f0f7ff; }
        .rule-info { background: #fff9db; padding: 15px; text-align: left; font-size: 0.9rem; border-radius: 8px; margin-bottom: 20px; }
        .progress-container { display: none; margin: 20px 0; }
        .progress-bar { background: #eee; height: 10px; border-radius: 5px; overflow: hidden; }
        .progress-fill { background: #4A90E2; width: 0%; height: 100%; transition: 0.3s; }
        #log-area { display: none; text-align: left; background: #fff5f5; padding: 15px; border-radius: 8px; border: 1px solid #ffc9c9; max-height: 200px; overflow-y: auto; }
        .log-error { color: #e74c3c; font-size: 0.85rem; margin-bottom: 5px; }
        .btn-zip { display: none; background: #27AE60; color: white; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; font-size: 1rem; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<div class="card">
    <h2>🖼️ AI 批次影像處理</h2>
    
    <div id="drop-zone">點擊或拖曳圖片至此</div>
    <input type="file" id="file-input" multiple accept="image/*" style="display:none">

    <div class="rule-info">
        <b>工作規則：</b>
        <ul>
            <li>檔名限用：<b>數字與半形底線 (_)</b></li>
            <li>規格：去背 + 縮放 800x800 + PNG</li>
            <li>異常情況會列在下方日誌</li>
        </ul>
    </div>

    <div class="progress-container" id="process-area">
        <div id="status">準備中...</div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
    </div>

    <div id="log-area">
        <b>⚠️ 跳過檔案說明：</b>
        <div id="log-list"></div>
    </div>

    <button id="download-btn" class="btn-zip">🚀 下載打包檔案 (ZIP)</button>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const logArea = document.getElementById('log-area');
    const logList = document.getElementById('log-list');
    const downloadBtn = document.getElementById('download-btn');
    const progressFill = document.getElementById('progress-fill');
    const statusText = document.getElementById('status');

    let finalZip = null;

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFiles(e.target.files);

    async function handleFiles(files) {
        if (files.length === 0) return;
        
        const zip = new JSZip();
        logList.innerHTML = "";
        logArea.style.display = "none";
        downloadBtn.style.display = "none";
        document.getElementById('process-area').style.display = "block";

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const nameOnly = file.name.split('.').slice(0, -1).join('.').trim();
            
            // 更新進度
            statusText.innerText = `正在處理: ${file.name}`;
            progressFill.style.width = `${((i + 1) / files.length) * 100}%`;

            // 1. 檔名檢查
            const namePattern = /^[0-9_]+$/;
            if (!namePattern.test(nameOnly)) {
                addError(file.name, `檔名含有非規範字元: "${nameOnly}"`);
                continue;
            }

            try {
                // 2. 去背
                const noBgBlob = await imglyRemoveBackground(file);
                
                // 3. 縮放
                const scaledBlob = await resizeImage(noBgBlob);
                
                // 4. 加入 ZIP
                zip.file(`${nameOnly}.png`, scaledBlob);
            } catch (err) {
                const reason = window.crossOriginIsolated ? "AI 處理失敗或格式錯誤" : "安全環境 (COOP/COEP) 未啟動，請按 Ctrl+F5";
                addError(file.name, reason);
            }
        }

        statusText.innerText = "處理完畢";
        if (Object.keys(zip.files).length > 0) {
            finalZip = await zip.generateAsync({type: "blob"});
            downloadBtn.style.display = "block";
        }
    }

    function resizeImage(blob) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 800; canvas.height = 800;
                const ctx = canvas.getContext('2d');
                const scale = Math.min(800 / img.width, 800 / img.height);
                const w = img.width * scale; const h = img.height * scale;
                ctx.drawImage(img, (800 - w) / 2, (800 - h) / 2, w, h);
                canvas.toBlob(resolve, 'image/png');
            };
            img.src = URL.createObjectURL(blob);
        });
    }

    function addError(fname, reason) {
        logArea.style.display = "block";
        const div = document.createElement('div');
        div.className = "log-error";
        div.innerText = `❌ ${fname}：${reason}`;
        logList.appendChild(div);
    }

    downloadBtn.onclick = () => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(finalZip);
        a.download = `output_${Date.now()}.zip`;
        a.click();
    };
</script>
</body>
</html>
