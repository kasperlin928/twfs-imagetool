<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <script>
        (function() {
            const s = document.createElement('script');
            // 在檔名後加上時間戳記，強迫瀏覽器重新下載最新的 Service Worker
            s.src = 'coi-serviceworker.js?v=' + Date.now();
            document.head.appendChild(s);
        })();
    </script>
    
    <title>AI 批次影像處理工具 (正式版)</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/bundle.js"></script>

    <style>
        :root { --primary: #4A90E2; --success: #27AE60; --danger: #E74C3C; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: #f4f7f9; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; color: #333; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        #drop-zone { border: 3px dashed #cbd5e0; border-radius: 12px; padding: 50px; text-align: center; cursor: pointer; transition: 0.3s; background: #fff; margin-bottom: 20px; }
        #drop-zone:hover { border-color: var(--primary); background: #f0f7ff; }
        .info-box { background: #fff9db; border-left: 5px solid #fcc419; padding: 15px; font-size: 0.9rem; margin-bottom: 20px; }
        #process-area { display: none; width: 100%; margin-top: 20px; }
        .progress-bg { background: #e9ecef; height: 12px; border-radius: 6px; overflow: hidden; margin: 10px 0; }
        #progress-fill { background: var(--primary); width: 0%; height: 100%; transition: 0.3s; }
        #log-area { display: none; margin-top: 20px; background: #fff5f5; border: 1px solid #ffc9c9; padding: 15px; border-radius: 8px; max-height: 200px; overflow-y: auto; text-align: left; }
        .log-item { color: var(--danger); font-size: 0.85rem; margin-bottom: 5px; border-bottom: 1px solid #ffe3e3; padding-bottom: 3px; }
        #download-btn { display: none; width: 100%; background: var(--success); color: white; padding: 16px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-top:0">🖼️ 批量去背縮放工具</h2>
    
    <div id="drop-zone">拖曳圖片到這裡，或點擊選取檔案</div>
    <input type="file" id="file-input" multiple accept="image/*">

    <div class="info-box">
        <strong>⚠️ 作業規範提醒：</strong>
        <ul>
            <li><b>檔名限制：</b> 僅限數字 (0-9) 與 底線 (_)</li>
            <li><b>輸出規格：</b> 自動去背 + 800x800 PNG</li>
            <li><b>故障排除：</b> 若顯示環境未啟動，請按 <b>Ctrl+F5</b></li>
        </ul>
    </div>

    <div id="process-area">
        <div id="status-text" style="font-weight:bold; color: var(--primary);">正在初始化...</div>
        <div class="progress-bg"><div id="progress-fill"></div></div>
        <div id="counter-text" style="text-align:right; font-size: 0.8rem; color: #666;">0 / 0</div>
    </div>

    <div id="log-area">
        <strong style="color: #c0392b;">⚠️ 跳過檔案：</strong>
        <div id="log-list" style="margin-top: 10px;"></div>
    </div>

    <button id="download-btn">🚀 下載處理完成圖 (ZIP)</button>
</div>

<script>
    const fileInput = document.getElementById('file-input');
    const dropZone = document.getElementById('drop-zone');
    const processArea = document.getElementById('process-area');
    const progressBar = document.getElementById('progress-fill');
    const statusText = document.getElementById('status-text');
    const counterText = document.getElementById('counter-text');
    const logArea = document.getElementById('log-area');
    const logList = document.getElementById('log-list');
    const downloadBtn = document.getElementById('download-btn');

    let zipBlob = null;

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => handleFiles(e.target.files);
    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.background = "#f0f7ff"; };
    dropZone.ondragleave = () => { dropZone.style.background = "#fff"; };
    dropZone.ondrop = (e) => { e.preventDefault(); handleFiles(e.dataTransfer.files); };

    async function handleFiles(files) {
        if (files.length === 0) return;

        const zip = new JSZip();
        zipBlob = null;
        logList.innerHTML = "";
        logArea.style.display = "none";
        downloadBtn.style.display = "none";
        processArea.style.display = "block";

        const namePattern = /^[0-9_]+$/;

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const nameOnly = file.name.split('.').slice(0, -1).join('.').trim();

            statusText.innerText = `正在處理: ${file.name}`;
            counterText.innerText = `${i + 1} / ${files.length}`;
            progressBar.style.width = `${((i + 1) / files.length) * 100}%`;

            // 1. 檔名檢查
            if (!namePattern.test(nameOnly)) {
                addLog(file.name, `檔名不符規定 (抓取到: "${nameOnly}")`);
                continue;
            }

            try {
                // 2. AI 去背 (偵測環境)
                let noBgBlob;
                try {
                    noBgBlob = await imglyRemoveBackground(file);
                } catch (e) {
                    if (!window.crossOriginIsolated) {
                        throw new Error("安全環境 (COOP/COEP) 未啟動，請連按兩次 Ctrl+F5 並等待網頁自動閃爍重整。");
                    } else {
                        throw new Error("AI 無法去背此圖 (可能圖檔毀損或過大)");
                    }
                }

                // 3. 縮放 800x800
                const finalBlob = await resizeImage(noBgBlob);
                zip.file(`${nameOnly}.png`, finalBlob);

            } catch (err) {
                addLog(file.name, err.message);
            }
        }

        statusText.innerText = "✅ 處理結束";
        if (Object.keys(zip.files).length > 0) {
            zipBlob = await zip.generateAsync({ type: "blob" });
            downloadBtn.style.display = "block";
        }
    }

    function resizeImage(blob) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                canvas.width = 800; canvas.height = 800;
                const ctx = canvas.getContext('2d');
                const ratio = Math.min(800 / img.width, 800 / img.height);
                const w = img.width * ratio;
                const h = img.height * ratio;
                ctx.clearRect(0, 0, 800, 800);
                ctx.drawImage(img, (800 - w) / 2, (800 - h) / 2, w, h);
                canvas.toBlob(resolve, 'image/png');
            };
            img.src = URL.createObjectURL(blob);
        });
    }

    function addLog(fname, reason) {
        logArea.style.display = "block";
        const div = document.createElement('div');
        div.className = "log-item";
        div.innerText = `❌ ${fname}：${reason}`;
        logList.appendChild(div);
    }

    downloadBtn.onclick = () => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(zipBlob);
        a.download = `IMGS_${Date.now()}.zip`;
        a.click();
    };
</script>
</body>
</html>
